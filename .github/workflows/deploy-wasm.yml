name: Deploy WASM Demo → GitHub Pages

# ─────────────────────────────────────────────────────────────────────────────
# ONE-TIME MANUAL SETUP (do this once before the first run):
#   Repository → Settings → Pages → Source → "GitHub Actions" → Save
# After that, every push to main triggers an automatic deployment.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**/*.md'
      - '**/*.MD'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment runs at a time; newer runs cancel the in-progress one
concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build WASM & Deploy to GitHub Pages
    runs-on: ubuntu-latest

    # Exposes the live URL in the Actions summary
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    # Run all JS-based actions on Node 24 to suppress the Node 20 deprecation warning
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      # wasm-tools is required for Avalonia Browser / Blazor-style WASM publishing
      - name: Install WASM workload
        run: dotnet workload install wasm-tools

      # Publish produces the runnable site under <output>/wwwroot
      - name: Publish Browser project
        run: dotnet publish samples/Pipboy.Avalonia.Demo.Browser/Pipboy.Avalonia.Demo.Browser.csproj --configuration Release --output "${{ runner.temp }}/publish"

      # Disable Jekyll so GitHub Pages doesn't mangle _framework/* asset names
      - name: Add .nojekyll
        run: touch "${{ runner.temp }}/publish/wwwroot/.nojekyll"

      # Serve index.html as the 404 page so any unknown path falls back to the app
      - name: Copy index.html → 404.html
        run: cp "${{ runner.temp }}/publish/wwwroot/index.html" "${{ runner.temp }}/publish/wwwroot/404.html"

      # NOTE: enablement is intentionally omitted.
      # Pages source must be set to "GitHub Actions" once in repo Settings → Pages.
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "${{ runner.temp }}/publish/wwwroot"

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
