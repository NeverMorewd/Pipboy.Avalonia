name: Deploy WASM Demo → GitHub Pages

on:
  # Auto-deploy whenever main is updated
  push:
    branches: [ main ]
  # Allow triggering manually from the Actions tab
  workflow_dispatch:

# contents: write  — needed for configure-pages enablement: true (auto-enables Pages)
# pages: write     — needed to upload and deploy the Pages artifact
# id-token: write  — needed for OIDC token used by deploy-pages
permissions:
  contents: write
  pages: write
  id-token: write

# Only one Pages deployment runs at a time; new runs cancel the in-progress one
concurrency:
  group: github-pages
  cancel-in-progress: true

# Suppress Node.js 20 deprecation warnings from third-party actions
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-and-deploy:
    name: Build WASM & Deploy to GitHub Pages
    runs-on: ubuntu-latest

    # Exposes the live URL in the Actions summary
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      # wasm-tools is required for Avalonia Browser / Blazor-style WASM publishing
      - name: Install WASM workload
        run: dotnet workload install wasm-tools

      # Publish produces the runnable site under <output>/wwwroot
      - name: Publish Browser project
        run: dotnet publish samples/Pipboy.Avalonia.Demo.Browser/Pipboy.Avalonia.Demo.Browser.csproj --configuration Release --output "${{ runner.temp }}/publish"

      # .nojekyll stops GitHub Pages from running Jekyll, which would mangle
      # Avalonia asset filenames that start with underscores (_framework, etc.)
      - name: Add .nojekyll
        run: touch "${{ runner.temp }}/publish/wwwroot/.nojekyll"

      # GitHub Pages returns 404 for any path that isn't a file;
      # serving index.html as 404 lets the app handle the URL client-side.
      - name: Copy index.html → 404.html
        run: cp "${{ runner.temp }}/publish/wwwroot/index.html" "${{ runner.temp }}/publish/wwwroot/404.html"

      # enablement: true — automatically enables Pages via API if not already on.
      # Requires contents: write permission above.
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "${{ runner.temp }}/publish/wwwroot"

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
