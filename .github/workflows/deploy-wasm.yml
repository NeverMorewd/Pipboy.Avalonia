name: Deploy WASM Demo → GitHub Pages

on:
  push:
    branches: [ main ]
    paths:
      - 'samples/**'
      - '**/*.csproj'
      - '**/*.sln'
      - '**/*.slnx'
      - 'src/**'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build WASM & Deploy to GitHub Pages
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          cache: true

      - name: Cache wasm-tools workload
        uses: actions/cache@v4
        with:
          path: ~/.dotnet/toolsets
          key: wasm-tools-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: wasm-tools-${{ runner.os }}-

      - name: Install WASM workload
        run: dotnet workload install wasm-tools

      - name: Publish Browser project (AOT)
        run: |
          dotnet publish samples/Pipboy.Avalonia.Demo.Browser/Pipboy.Avalonia.Demo.Browser.csproj \
            --configuration Release \
            --output "${{ runner.temp }}/publish" \
            -p:RunAOTCompilation=true

      - name: Verify publish output
        run: test -f "${{ runner.temp }}/publish/wwwroot/index.html"

      - name: Add .nojekyll
        run: touch "${{ runner.temp }}/publish/wwwroot/.nojekyll"

      - name: Copy index.html → 404.html
        run: cp "${{ runner.temp }}/publish/wwwroot/index.html" "${{ runner.temp }}/publish/wwwroot/404.html"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "${{ runner.temp }}/publish/wwwroot"
          retention-days: 1 
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4